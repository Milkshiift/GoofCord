name: Bug Report
description: Create a report to help us improve
title: "[BUG] "
labels: ["bug"]
body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting.
      options:
        - label: I have searched existing issues and found no duplicates
          required: true
        - label: I have checked the [FAQ/Wiki](https://github.com/Milkshiift/GoofCord/wiki/FAQ) and found no solution
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See '...'
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe the expected behavior...
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots or screen recordings to help explain the problem.
      placeholder: Drag and drop images here or paste links...
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Name and version of your OS.
      placeholder: e.g. Windows 11 23H2, Ubuntu 24.04, macOS Sonoma 14.5
    validations:
      required: true

  - type: input
    id: goofcord-version
    attributes:
      label: GoofCord Version
      description: Found at the bottom of the Discord settings, or by right-clicking the tray icon.
      placeholder: e.g. 2.1.0
    validations:
      required: true

  - type: dropdown
    id: installation-method
    attributes:
      label: Installation Method
      description: How did you install GoofCord?
      options:
        - Installer from GitHub Releases (.exe, .dmg, .deb, .rpm, etc.)
        - Portable from GitHub Releases (.zip, .tar)
        - AUR (Arch User Repository)
        - Flathub
        - Nix package
        - Scoop
        - Winget
        - Other (specify in Additional Information)
    validations:
      required: true

  - type: textarea
    id: additional-information
    attributes:
      label: Additional Information
      description: Any other context, logs, or details that might be helpful.
      placeholder: 
    validations:
      required: false